<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WowLife · Сертификаты и выплаты</title>
    <meta name="theme-color" content="#f8fbff" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="WowLife" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="theme-newstar">
    <div class="layout">
      <aside class="sidebar" aria-label="Основная навигация">
        <a class="brand" href="/redeem" aria-label="WowLife">
          <img src="/assets/wowlife-logo.svg" alt="" />
        </a>
        <nav class="desktop-nav">
          <a href="/redeem" data-route="redeem">Погасить</a>
          <a href="/certificates" data-route="certificates">Сертификаты</a>
          <a href="/reconciliations" data-route="reconciliations">Сверки</a>
          <a href="/payments" data-route="payments">Оплаты</a>
          <a href="/services" data-route="services">Услуги</a>
          <a href="/profile" data-route="profile">Профиль</a>
        </nav>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <button id="backButton" class="icon-button hidden" type="button" aria-label="Назад">←</button>
          <img class="mobile-logo" src="/assets/wowlife-logo.svg" alt="" />
          <h1 id="pageTitle">Погасить сертификат</h1>
          <button class="icon-button logout-button" type="button" aria-label="Выход">⎋</button>
        </header>

        <div id="pushPrompt" class="push-prompt hidden"></div>
        <main id="app" class="content" tabindex="-1"></main>

        <nav class="bottom-nav" aria-label="Мобильная навигация">
          <a href="/redeem" data-route="redeem">
            <span class="nav-icon nav-icon-image"><img src="/assets/mobile-check.svg" alt="" /></span>
            <span>Погасить</span>
          </a>
          <a href="/certificates" data-route="certificates">
            <span class="nav-icon nav-icon-image"><img src="/assets/mobile-copy.png" alt="" /></span>
            <span>Сертификаты</span>
          </a>
          <a href="/reconciliations" data-route="reconciliations">
            <span class="nav-icon nav-icon-svg" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 11l3 3L22 4" />
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
              </svg>
            </span>
            <span>Сверки</span>
          </a>
          <a href="/payments" data-route="payments">
            <span class="nav-icon nav-icon-image"><img src="/assets/mobile-wallet.png" alt="" /></span>
            <span>Оплаты</span>
          </a>
          <a href="/services" data-route="services">
            <span class="nav-icon nav-icon-svg" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.59 13.41 11 3.83A2 2 0 0 0 9.59 3H4a1 1 0 0 0-1 1v5.59A2 2 0 0 0 3.59 11l9.59 9.59a2 2 0 0 0 2.82 0l4.59-4.59a2 2 0 0 0 0-2.59Z" />
                <path d="M7 7h.01" />
              </svg>
            </span>
            <span>Услуги</span>
          </a>
          <a href="/profile" data-route="profile">
            <span class="nav-icon nav-icon-svg" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21a8 8 0 0 0-16 0" />
                <circle cx="12" cy="8" r="4" />
              </svg>
            </span>
            <span>Профиль</span>
          </a>
        </nav>
      </section>
    </div>

    <template id="loadingTemplate">
      <div class="loading-card">Загрузка...</div>
    </template>

    <script src="/vendor/jsQR.js"></script>
    <script src="/app.js"></script>
  </body>
</html>

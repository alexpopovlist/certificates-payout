<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WakeSurf · Сертификаты и выплаты</title>
    <meta name="theme-color" content="#f8fbff" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="theme-newstar">
    <div class="layout">
      <aside class="sidebar" aria-label="Основная навигация">
        <a class="brand" href="#redeem" aria-label="На главную">
          <img src="/assets/wakemesurf-logo.svg" alt="" />
          <span><strong>WakeSurf</strong><small>Сертификаты</small></span>
        </a>
        <nav class="desktop-nav">
          <a href="#redeem" data-route="redeem">Погасить</a>
          <a href="#certificates" data-route="certificates">Сертификаты</a>
          <a href="#payments" data-route="payments">Оплаты</a>
        </nav>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <button id="backButton" class="icon-button hidden" type="button" aria-label="Назад">←</button>
          <img class="mobile-logo" src="/assets/wakemesurf-logo.svg" alt="" />
          <h1 id="pageTitle">Погасить сертификат</h1>
          <button class="icon-button logout-button" type="button" aria-label="Выход">⎋</button>
        </header>

        <main id="app" class="content" tabindex="-1"></main>

        <nav class="bottom-nav" aria-label="Мобильная навигация">
          <a href="#redeem" data-route="redeem">
            <span class="nav-icon">✓</span>
            <span>Погасить</span>
          </a>
          <a href="#certificates" data-route="certificates">
            <span class="nav-icon">▢</span>
            <span>Сертификаты</span>
          </a>
          <a href="#payments" data-route="payments">
            <span class="nav-icon">▣</span>
            <span>Оплаты</span>
          </a>
        </nav>
      </section>
    </div>

    <template id="loadingTemplate">
      <div class="loading-card">Загрузка...</div>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
